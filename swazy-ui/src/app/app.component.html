<!-- PrimeNG Menubar -->
<p-menubar [model]="menuItems">
  <ng-template pTemplate="start">
    <button pButton type="button" label="Swazy Console" icon="pi pi-home" class="p-button-text p-button-lg" routerLink="/"></button>
  </ng-template>
  <ng-template pTemplate="end">
    <!-- Placeholder for future items like user profile or logout -->
    <!-- Example: <button pButton type="button" icon="pi pi-user" class="p-button-rounded p-button-text"></button> -->
  </ng-template>
</p-menubar>

<!-- Main Content Area -->
<!-- We can use PrimeNG layout classes here if desired, or keep simple divs -->
<div class="p-4 mt-2"> <!-- Replaced Tailwind padding/margin with PrimeFlex like classes for consistency, can adjust -->
  <main>
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Footer -->
<!-- Basic footer, can be styled further with PrimeNG utilities or custom CSS -->
<footer class="mt-6 p-4 text-center text-sm text-gray-600 surface-ground"> <!-- Adjusted Tailwind-like classes, consider PrimeFlex or custom styling. Added surface-ground for theming. -->
  <p>&copy; 2025 Swazy Inc. All rights reserved.</p>
  <p>Swazy Management Console</p>
  <div class="mt-2">
    <button pButton type="button" label="Light Theme" (click)="changeTheme('lara-light-blue')" class="p-button-sm p-button-outlined mr-2"></button>
    <button pButton type="button" label="Dark Theme" (click)="changeTheme('lara-dark-blue')" class="p-button-sm p-button-outlined"></button>
  </div>
</footer>
